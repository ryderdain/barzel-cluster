# Ansible configuration for the brzl-demo k3s nodes.
# Run Ansible from this directory so this file is picked up automatically.

[defaults]
# dev defaults — the generated inventory pins the per-env values (the env key
# via ansible_ssh_private_key_file group var; platform.sh passes -i explicitly),
# so prod runs override both without touching this file.
inventory            = ./inventory/dev.yml
roles_path           = ./roles
remote_user          = ubuntu
private_key_file     = ~/.ssh/brzl-dev-node
interpreter_python   = /usr/bin/python3
# YAML-formatted task output via the builtin default callback. (The old
# `stdout_callback = yaml` was community.general.yaml, removed in
# community.general 12.0 — use result_format on the builtin default instead.)
stdout_callback      = default
result_format        = yaml
retry_files_enabled  = False
# Each node is addressed by its EC2 instance-id (inventory ansible_host) and
# reached through SSM, not by IP, so there is no stable host key to track and
# strict checking would only fight the throwaway tunnel. Deliberate PoC choice.
host_key_checking    = False

[ssh_connection]
pipelining = True
# Reach nodes via SSM Session Manager (SSH-over-SSM). The inventory's
# ansible_host is the EC2 instance-id; this ProxyCommand opens an SSM tunnel to
# the node's LOCAL sshd over the agent's outbound data channel — so no inbound
# :22 and no public IP are needed (20-security sets enable_ssh_ingress=false;
# 30-iam grants the node SSM perms). Access is gated by your AWS/SSM IAM
# (assume brzl-tofu-apply; AWS_PROFILE + region must be set in the env) plus
# the break-glass key over the tunnel. Needs the session-manager-plugin (in the
# toolbox image, or installed locally). UserKnownHostsFile=/dev/null keeps the
# rotating instance-ids out of ~/.ssh/known_hosts.
# IdentitiesOnly=yes is REQUIRED: without it ssh offers every ssh-agent/default
# identity before the -i key and trips sshd's MaxAuthTries ("Too many
# authentication failures") — worse with the security role's MaxAuthTries 3.
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o UserKnownHostsFile=/dev/null -o IdentitiesOnly=yes -o PreferredAuthentications=publickey -o "ProxyCommand=aws ssm start-session --target %h --document-name AWS-StartSSHSession --parameters portNumber=%p"
