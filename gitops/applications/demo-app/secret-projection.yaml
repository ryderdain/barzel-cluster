# Secret projection: copy the CNPG-generated `pg-app` secret from cnpg-demo into
# the demo-app's own `demo` namespace, via External Secrets Operator (installed
# wave 1). This keeps the app in its own namespace while the credential stays
# owned + rotated by CNPG — the app never reaches into the operator's namespace.
#
# Flow:
#   ClusterSecretStore (k8s provider, remoteNamespace=cnpg-demo)
#     └─ authenticates as the eso-pg-app-reader SA (scoped RBAC below)
#   ExternalSecret (ns: demo)
#     └─ reads cnpg-demo/pg-app[username,password,dbname] → templates a DSN with
#        the pg-rw FQDN → writes demo/pg-app[uri]
#   demo-app Deployment → secretKeyRef demo/pg-app[uri]
#
# Why rebuild the DSN: CNPG's own `uri` key embeds the SHORT host `pg-rw`, which
# from the `demo` namespace would resolve as pg-rw.demo.svc (wrong). We template
# it with the cross-namespace FQDN instead.
#
# CRD apiVersion is external-secrets.io/v1beta1 (served by chart 0.10.x). Verify
# against the installed ESO version at bring-up; v1 is GA in later releases.
---
# Least-privilege reader the ClusterSecretStore authenticates as: get/list/watch
# only the single pg-app secret in cnpg-demo (+ the selfsubjectrulesreview the
# ESO k8s provider issues to validate its own access).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: eso-pg-app-reader
  namespace: cnpg-demo
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: eso-pg-app-reader
  namespace: cnpg-demo
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["pg-app"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["authorization.k8s.io"]
    resources: ["selfsubjectrulesreviews"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: eso-pg-app-reader
  namespace: cnpg-demo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: eso-pg-app-reader
subjects:
  - kind: ServiceAccount
    name: eso-pg-app-reader
    namespace: cnpg-demo
---
# Cluster-scoped store pointing ESO at the local API, reading from cnpg-demo as
# the scoped reader SA. CA comes from the well-known kube-root-ca.crt ConfigMap
# that every namespace carries.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: cnpg-demo-pg
spec:
  provider:
    kubernetes:
      remoteNamespace: cnpg-demo
      server:
        url: https://kubernetes.default.svc
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          key: ca.crt
          namespace: cnpg-demo
      auth:
        serviceAccount:
          name: eso-pg-app-reader
          namespace: cnpg-demo
---
# Materialises demo/pg-app from cnpg-demo/pg-app. Owner creationPolicy so ESO
# manages the target secret's lifecycle; refresh picks up CNPG password rotation.
# The target `uri` is templated (v2 engine) from the fetched fields so the host
# is the cross-namespace FQDN; sslmode=require encrypts to CNPG's TLS endpoint
# without pinning its private CA.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: pg-app
  namespace: demo
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: cnpg-demo-pg
  target:
    name: pg-app
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        uri: "postgresql://{{ .username }}:{{ .password }}@pg-rw.cnpg-demo.svc.cluster.local:5432/{{ .dbname }}?sslmode=require"
  data:
    - secretKey: username
      remoteRef:
        key: pg-app
        property: username
    - secretKey: password
      remoteRef:
        key: pg-app
        property: password
    - secretKey: dbname
      remoteRef:
        key: pg-app
        property: dbname
