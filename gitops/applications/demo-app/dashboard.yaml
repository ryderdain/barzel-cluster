# Grafana dashboard: side-by-side demo-app + CloudNativePG overview,
# delivered as a sidecar-discovered ConfigMap (label grafana_dashboard=1; the
# kube-prometheus-stack Grafana sidecar watches all namespaces). Generated by
# gitops/applications/demo-app/dashboard.gen.py from verified metric names — edit there, not here.
apiVersion: v1
kind: ConfigMap
metadata:
  name: brzl-demo-overview-dashboard
  namespace: demo
  labels:
    grafana_dashboard: "1"
    app: demo-app
data:
  brzl-demo-overview.json: |
    {
      "uid": "brzl-demo-overview",
      "title": "brzl-demo \u2014 app & database overview",
      "tags": [
        "brzl-demo",
        "demo-app",
        "cloudnative-pg"
      ],
      "schemaVersion": 39,
      "version": 1,
      "editable": true,
      "time": {
        "from": "now-30m",
        "to": "now"
      },
      "refresh": "10s",
      "timezone": "",
      "templating": {
        "list": [
          {
            "name": "datasource",
            "type": "datasource",
            "query": "prometheus",
            "label": "Data source",
            "current": {},
            "hide": 0,
            "refresh": 1
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "row",
          "title": "At a glance \u2014 errors & lag",
          "collapsed": false,
          "gridPos": {
            "x": 0,
            "y": 0,
            "w": 24,
            "h": 1
          },
          "panels": []
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Searches / s",
          "description": "App search throughput.",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "x": 0,
            "y": 1,
            "w": 6,
            "h": 4
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "sum(rate(demoapp_searches_total[5m]))",
              "legendFormat": "",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              },
              "color": {
                "mode": "thresholds"
              }
            },
            "overrides": []
          },
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "auto",
            "textMode": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            }
          }
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Sefaria errors / s",
          "description": "Outbound calls not returning 200 \u2014 app-side drift.",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "x": 6,
            "y": 1,
            "w": 6,
            "h": 4
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "sum(rate(demoapp_sefaria_requests_total{status!=\"200\"}[5m]))",
              "legendFormat": "",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "red",
                    "value": 0.001
                  }
                ]
              },
              "color": {
                "mode": "thresholds"
              }
            },
            "overrides": []
          },
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "auto",
            "textMode": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            }
          }
        },
        {
          "id": 4,
          "type": "stat",
          "title": "TXN rollbacks / s",
          "description": "Postgres rolled-back transactions \u2014 DB-side errors.",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "x": 12,
            "y": 1,
            "w": 6,
            "h": 4
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "sum(rate(cnpg_pg_stat_database_xact_rollback{datname=\"app\"}[5m]))",
              "legendFormat": "",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "red",
                    "value": 0.001
                  }
                ]
              },
              "color": {
                "mode": "thresholds"
              }
            },
            "overrides": []
          },
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "auto",
            "textMode": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            }
          }
        },
        {
          "id": 5,
          "type": "stat",
          "title": "Max replication lag",
          "description": "Standby replay lag behind the primary.",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "x": 18,
            "y": 1,
            "w": 6,
            "h": 4
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "max(cnpg_pg_replication_lag)",
              "legendFormat": "",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 1
                  },
                  {
                    "color": "red",
                    "value": 10
                  }
                ]
              },
              "color": {
                "mode": "thresholds"
              }
            },
            "overrides": []
          },
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "auto",
            "textMode": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            }
          }
        },
        {
          "id": 6,
          "type": "row",
          "title": "demo-app (Sefaria search)",
          "collapsed": false,
          "gridPos": {
            "x": 0,
            "y": 5,
            "w": 24,
            "h": 1
          },
          "panels": []
        },
        {
          "id": 7,
          "type": "timeseries",
          "title": "HTTP requests/s by status",
          "description": "Served requests; a rise in 5xx is the app-error cue.",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "x": 0,
            "y": 6,
            "w": 12,
            "h": 8
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "sum by (status) (rate(demoapp_http_requests_total[5m]))",
              "legendFormat": "{{status}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 12,
                "lineWidth": 2,
                "showPoints": "never",
                "stacking": {
                  "mode": "none"
                }
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          }
        },
        {
          "id": 8,
          "type": "timeseries",
          "title": "Outbound Sefaria calls/s by status",
          "description": "Upstream API calls; 'error'/non-200 = upstream drift.",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "x": 12,
            "y": 6,
            "w": 12,
            "h": 8
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "sum by (status) (rate(demoapp_sefaria_requests_total[5m]))",
              "legendFormat": "{{status}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 12,
                "lineWidth": 2,
                "showPoints": "never",
                "stacking": {
                  "mode": "none"
                }
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          }
        },
        {
          "id": 9,
          "type": "timeseries",
          "title": "Sefaria call latency",
          "description": "Outbound API latency \u2014 climbing p95 hints at upstream trouble.",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "x": 0,
            "y": 14,
            "w": 12,
            "h": 8
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "histogram_quantile(0.95, sum by (le) (rate(demoapp_sefaria_request_duration_seconds_bucket[5m])))",
              "legendFormat": "p95",
              "refId": "A"
            },
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "histogram_quantile(0.50, sum by (le) (rate(demoapp_sefaria_request_duration_seconds_bucket[5m])))",
              "legendFormat": "p50",
              "refId": "B"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 12,
                "lineWidth": 2,
                "showPoints": "never",
                "stacking": {
                  "mode": "none"
                }
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          }
        },
        {
          "id": 10,
          "type": "timeseries",
          "title": "DB rows written/s by table",
          "description": "App-side write activity \u2014 should track searches; divergence = drift.",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "x": 12,
            "y": 14,
            "w": 12,
            "h": 8
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "sum by (table) (rate(demoapp_db_rows_written_total[5m]))",
              "legendFormat": "{{table}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "wps",
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 12,
                "lineWidth": 2,
                "showPoints": "never",
                "stacking": {
                  "mode": "none"
                }
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          }
        },
        {
          "id": 11,
          "type": "row",
          "title": "Postgres (CloudNativePG)",
          "collapsed": false,
          "gridPos": {
            "x": 0,
            "y": 22,
            "w": 24,
            "h": 1
          },
          "panels": []
        },
        {
          "id": 12,
          "type": "timeseries",
          "title": "Transactions/s (commit vs rollback)",
          "description": "DB transaction rate; rollbacks should stay ~0.",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "x": 0,
            "y": 23,
            "w": 12,
            "h": 8
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "sum(rate(cnpg_pg_stat_database_xact_commit{datname=\"app\"}[5m]))",
              "legendFormat": "commit",
              "refId": "A"
            },
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "sum(rate(cnpg_pg_stat_database_xact_rollback{datname=\"app\"}[5m]))",
              "legendFormat": "rollback",
              "refId": "B"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 12,
                "lineWidth": 2,
                "showPoints": "never",
                "stacking": {
                  "mode": "none"
                }
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          }
        },
        {
          "id": 13,
          "type": "timeseries",
          "title": "Active backends by pod",
          "description": "Connections per instance \u2014 the demo-app pool plus replicas.",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "x": 12,
            "y": 23,
            "w": 12,
            "h": 8
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "sum by (pod) (cnpg_backends_total)",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 12,
                "lineWidth": 2,
                "showPoints": "never",
                "stacking": {
                  "mode": "none"
                }
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          }
        },
        {
          "id": 14,
          "type": "timeseries",
          "title": "Tuples/s (in/out)",
          "description": "Row-level activity \u2014 should rise with app writes/reads.",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "x": 0,
            "y": 31,
            "w": 12,
            "h": 8
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "sum(rate(cnpg_pg_stat_database_tup_inserted{datname=\"app\"}[5m]))",
              "legendFormat": "inserted",
              "refId": "A"
            },
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "sum(rate(cnpg_pg_stat_database_tup_fetched{datname=\"app\"}[5m]))",
              "legendFormat": "fetched",
              "refId": "B"
            },
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "sum(rate(cnpg_pg_stat_database_tup_updated{datname=\"app\"}[5m]))",
              "legendFormat": "updated",
              "refId": "C"
            },
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "sum(rate(cnpg_pg_stat_database_tup_deleted{datname=\"app\"}[5m]))",
              "legendFormat": "deleted",
              "refId": "D"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 12,
                "lineWidth": 2,
                "showPoints": "never",
                "stacking": {
                  "mode": "none"
                }
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          }
        },
        {
          "id": 15,
          "type": "timeseries",
          "title": "Cache hit ratio & DB size",
          "description": "Buffer cache hit ratio (1.0 = all from cache).",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "x": 12,
            "y": 31,
            "w": 12,
            "h": 8
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "sum(rate(cnpg_pg_stat_database_blks_hit{datname=\"app\"}[5m])) / clamp_min(sum(rate(cnpg_pg_stat_database_blks_hit{datname=\"app\"}[5m])) + sum(rate(cnpg_pg_stat_database_blks_read{datname=\"app\"}[5m])), 1)",
              "legendFormat": "cache hit ratio",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 12,
                "lineWidth": 2,
                "showPoints": "never",
                "stacking": {
                  "mode": "none"
                }
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          }
        }
      ]
    }
