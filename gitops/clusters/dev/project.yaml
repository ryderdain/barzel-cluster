# AppProject scoping every dev Application. A project (not the implicit
# "default") lets us constrain what these apps may deploy — source repo,
# destination cluster/namespaces, and allowed resource kinds — so a compromised
# or fat-fingered manifest can't sync arbitrary cluster-scoped objects.
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: brzl-dev
  namespace: argocd
  # Keep the project even if the app-of-apps is deleted, so child apps don't
  # orphan mid-teardown; teardown removes it explicitly.
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: brzl-demo dev cluster — infrastructure, operators, applications
  sourceRepos:
    - git@github.com:ryderdain/barzel-cluster.git
    # Helm chart repos the child apps render from (images still come via ECR
    # pull-through; only the chart packages are fetched here).
    - https://argoproj.github.io/argo-helm
    - https://kubernetes-sigs.github.io/aws-ebs-csi-driver
    - https://cloudnative-pg.github.io/charts
    - https://charts.external-secrets.io
    - https://prometheus-community.github.io/helm-charts
  destinations:
    - server: https://kubernetes.default.svc
      namespace: "*"
  # PoC: allow cluster-scoped resources (CRDs, StorageClass, ClusterRoles the
  # operators need). Tighten to an explicit allowlist for prod.
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
