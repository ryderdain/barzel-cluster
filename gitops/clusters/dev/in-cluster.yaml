# Declarative registration of the local cluster as an ArgoCD cluster Secret, so
# the ApplicationSet's `clusters` generator can read per-cluster values from it.
# We register it explicitly (rather than rely on ArgoCD's implicit in-cluster)
# only to attach the selector label + the two annotations the generator needs.
#
# The annotations carry the account-bearing values and are NOT committed — the
# bootstrap shim writes them at bring-up (resolve_ecr_host.sh for the host; SSM
# for the bucket), so the account id / bucket name never live in git:
#   brzl.dev/ecr-host      <account>.dkr.ecr.<region>.amazonaws.com
#   brzl.dev/backup-bucket brzl-dev-cnpg-backups-<account>
#
# Selector label keeps this the ONLY cluster the generator matches (ArgoCD's
# implicit in-cluster lacks the label), so there's no duplicate.
apiVersion: v1
kind: Secret
metadata:
  name: brzl-dev-in-cluster
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: cluster
    brzl.dev/appset-cluster: "true"
type: Opaque
stringData:
  name: in-cluster
  server: https://kubernetes.default.svc
  config: |
    {"tlsClientConfig":{"insecure":false}}
