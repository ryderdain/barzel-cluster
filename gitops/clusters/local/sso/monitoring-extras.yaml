# A stable ClusterIP for Prometheus so oauth2-proxy-prometheus has a fixed upstream.
# kube-prometheus-stack's own Prometheus Service carries the release name in its
# generated name; this thin Service selects the Prometheus pod by its well-known
# label and exposes a predictable `prometheus.monitoring.svc:9090`.
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: operator-sso
spec:
  selector:
    app.kubernetes.io/name: prometheus
  ports:
    - name: http
      port: 9090
      targetPort: 9090
