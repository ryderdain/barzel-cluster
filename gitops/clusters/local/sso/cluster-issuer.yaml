# Let's Encrypt ClusterIssuers solving DNS-01 through the FreeDNS (afraid.org)
# webhook (tgckpg/cert-manager-webhook-freedns, groupName acme.freedns.afraid.org),
# so we get publicly-trusted certs for the owned domain *.sso.barzel.sh without the
# host being internet-reachable. The FreeDNS account credential is provided to the
# *webhook's* Helm release at bring-up — not here.
#
# __ACME_EMAIL__ is substituted at apply (k3d_up.sh --with-sso, from $ACME_EMAIL).
# Use the STAGING issuer while iterating (lenient rate limits); switch the
# Certificate's issuerRef to prod once the chain validates.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: __ACME_EMAIL__
    privateKeySecretRef:
      name: letsencrypt-staging-account
    solvers:
      - dns01:
          webhook:
            groupName: acme.freedns.afraid.org
            solverName: freedns-solver
            config:
              # FreeDNS auth comes from the webhook's Helm values; no per-issuer
              # secret needed (webhook ≥ 2024-11).
              {}
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: __ACME_EMAIL__
    privateKeySecretRef:
      name: letsencrypt-prod-account
    solvers:
      - dns01:
          webhook:
            groupName: acme.freedns.afraid.org
            solverName: freedns-solver
            config: {}
